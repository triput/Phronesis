{# Compact radial progress meter — percent 0–100 (pathLength=100) #}
{% with p=percent|default:0 %}
<svg class="shrink-0 w-16 h-16" viewBox="0 0 36 36" aria-hidden="true">
  <circle cx="18" cy="18" r="15.5" fill="none" stroke="currentColor" stroke-width="2.5"
          class="text-cockpit-border" pathLength="100" />
  <circle cx="18" cy="18" r="15.5" fill="none" stroke="currentColor" stroke-width="2.5"
          class="{% if p >= 100 %}text-emerald-400{% else %}text-cockpit-accent-bright{% endif %}"
          stroke-linecap="round"
          pathLength="100"
          stroke-dasharray="{{ p }} 100"
          transform="rotate(-90 18 18)" />
  <text x="18" y="19.5" text-anchor="middle" class="fill-cockpit-text"
        style="font-size:7px;font-family:ui-monospace,monospace">{{ p }}%</text>
</svg>
{% endwith %}
