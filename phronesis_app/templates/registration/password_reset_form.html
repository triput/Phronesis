<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>Password reset</title>
<script src="https://cdn.tailwindcss.com"></script></head>
<body class="bg-zinc-950 text-zinc-200 min-h-screen flex items-center justify-center p-4">
<form method="post" class="max-w-sm w-full border border-zinc-800 rounded-xl p-6 bg-zinc-900">
{% csrf_token %}
<h1 class="text-xl font-semibold">Reset password</h1>
<p class="text-sm text-zinc-500 mt-1">Enter your owner account email.</p>
{{ form.email }}
<button class="mt-4 w-full bg-emerald-600 text-black rounded-lg py-2">Send reset link</button>
</form>
</body></html>
