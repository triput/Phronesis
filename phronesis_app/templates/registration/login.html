<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Phronesis · Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'DM Sans', sans-serif; background: radial-gradient(900px 500px at 50% -20%, #0f2922, #09090b 60%); }
    .display { font-family: 'Syne', sans-serif; }
  </style>
</head>
<body class="h-full flex items-center justify-center text-zinc-200 p-4">
  <form method="post" class="w-full max-w-sm rounded-xl border border-zinc-800 bg-zinc-950/90 p-8 shadow-2xl shadow-emerald-950/30">
    {% csrf_token %}
    <h1 class="display text-3xl text-white tracking-tight">Phronesis</h1>
    <p class="mt-1 text-sm text-zinc-500">Owner cockpit access</p>
    {% if error %}
      <p class="mt-4 text-sm text-red-400">{{ error }}</p>
    {% endif %}
    <label class="block mt-6 text-xs font-mono uppercase tracking-wider text-zinc-500">Username</label>
    <input name="username" autocomplete="username" required
           class="mt-1 w-full rounded-lg border border-zinc-800 bg-zinc-900 px-3 py-2 text-zinc-100 focus:outline-none focus:border-emerald-700">
    <label class="block mt-4 text-xs font-mono uppercase tracking-wider text-zinc-500">Password</label>
    <input name="password" type="password" autocomplete="current-password" required
           class="mt-1 w-full rounded-lg border border-zinc-800 bg-zinc-900 px-3 py-2 text-zinc-100 focus:outline-none focus:border-emerald-700">
    <button type="submit"
            class="mt-6 w-full rounded-lg bg-emerald-600 py-2.5 text-sm font-semibold text-black hover:bg-emerald-500 transition">
      Enter cockpit
    </button>
  </form>
</body>
</html>
