<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>Set new password</title>
<script src="https://cdn.tailwindcss.com"></script></head>
<body class="bg-zinc-950 text-zinc-200 min-h-screen flex items-center justify-center p-4">
<form method="post" class="max-w-sm w-full border border-zinc-800 rounded-xl p-6 bg-zinc-900 space-y-3">
{% csrf_token %}
<h1 class="text-xl font-semibold">Choose a new password</h1>
{{ form.as_p }}
<button class="w-full bg-emerald-600 text-black rounded-lg py-2">Update password</button>
</form>
</body></html>
