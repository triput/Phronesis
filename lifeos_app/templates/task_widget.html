<div id="task-widget-{{ task.id }}" 
     class="task-widget bg-gray-900/60 border {% if task.is_active %}border-[#E0115F]{% else %}border-gray-800/80{% endif %} rounded-xl p-5 shadow-lg flex flex-col justify-between h-48 transition-all duration-300 hover:border-[#50C878]/40 hover:bg-gray-900/80"
     data-task-id="{{ task.id }}"
     data-time-spent="{{ task.time_spent_seconds }}"
     data-is-active="{% if task.is_active %}true{% else %}false{% endif %}"
     data-started-at="{% if task.started_at %}{{ task.started_at.isoformat }}{% endif %}">
    
    <!-- Widget Header -->
    <div class="flex items-start justify-between">
        <div class="space-y-1">
            <div class="flex items-center space-x-1.5 flex-wrap gap-y-1">
                <span class="inline-flex items-center px-1.5 py-0.5 rounded text-[9px] font-bold bg-gray-800 text-gray-400 uppercase tracking-wider">
                    {{ task.item_type }}
                </span>
                {% if task.domain %}
                <span class="inline-flex items-center px-1.5 py-0.5 rounded text-[9px] font-bold text-white uppercase tracking-wider" style="background-color: {{ task.domain.color }}22; border: 1px solid {{ task.domain.color }}44;">
                    {{ task.domain.name }}
                </span>
                {% elif task.domain_category %}
                <span class="inline-flex items-center px-1.5 py-0.5 rounded text-[9px] font-bold bg-[#0F52BA]/10 text-[#0F52BA] border border-[#0F52BA]/20 uppercase tracking-wider">
                    {{ task.domain_category }}
                </span>
                {% endif %}
                
                {% if task.notion_link %}
                <a href="{{ task.notion_link.notion_page_url }}" target="_blank" title="View Notion Document" class="inline-flex items-center px-1.5 py-0.5 rounded text-[9px] font-bold bg-blue-950/45 text-blue-400 border border-blue-500/25 hover:bg-blue-900/30 transition-colors uppercase tracking-wider space-x-1">
                    <span>📓</span> <span>Notion</span>
                </a>
                {% endif %}
            </div>
            <h4 class="text-sm font-bold text-gray-200 leading-tight mt-1.5 line-clamp-2">{{ task.title }}</h4>
        </div>
        
        <div class="flex items-center space-x-1.5">
            <!-- Pin/Unpin Toggle -->
            <a href="{% url 'toggle-pin' task.id %}" 
               title="{% if task.is_pinned %}Unpin from Today{% else %}Pin to Today's Agenda{% endif %}"
               class="text-gray-500 hover:bg-gray-800/50 p-1 rounded-lg transition-colors {% if task.is_pinned %}text-[#E0115F]{% else %}text-gray-500 hover:text-[#E0115F]{% endif %}">
                <svg class="h-4 w-4 fill-current" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M10 2a1 1 0 01.993.883L11 3v4.585l1.707 1.707a1 1 0 01.283.566l.01.142V11a1 1 0 01-.883.993L12 12h-1v5a1 1 0 01-1.993.117L9 17v-5H8a1 1 0 01-.993-.883L7 11V9.998a1 1 0 01.293-.707L9 7.584V3a1 1 0 011-1z" clip-rule="evenodd"/>
                </svg>
            </a>

            <!-- Mark Complete -->
            <a href="{% url 'toggle_task' task.id %}" 
               title="Mark Complete"
               class="text-gray-500 hover:text-[#50C878] p-1 rounded-lg hover:bg-gray-850 transition-colors">
                <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
            </a>
        </div>
    </div>

    <!-- Widget Footer / Controls -->
    <div class="flex items-end justify-between mt-4 pt-3 border-t border-gray-800/50">
        <div class="flex flex-col">
            <span class="text-[9px] text-gray-500 uppercase tracking-wider font-extrabold">Focus Elapsed</span>
            <span id="timer-display-{{ task.id }}" class="font-mono text-xl text-[#50C878] font-bold tracking-tight">00:00:00</span>
        </div>
        
        <button id="action-btn-{{ task.id }}" 
                onclick="toggleFocusTimer({{ task.id }})"
                class="flex items-center space-x-1.5 px-3 py-1.5 rounded-lg text-xs font-semibold shadow-md transition-all duration-200 focus:outline-none">
            <!-- Injected by JS -->
        </button>
    </div>
</div>
