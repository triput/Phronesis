<form hx-post="{% url 'quick-entry' %}" hx-swap="outerHTML" class="relative flex items-center space-x-1.5">
    {% csrf_token %}
    <input type="text" name="title" placeholder="Brain dump..." class="bg-gray-900/60 text-gray-100 text-sm rounded-lg focus:ring-2 focus:ring-[#9966CC] focus:border-transparent block w-48 p-2 border border-gray-700/60 placeholder-gray-500 bg-opacity-50" required>
    <select name="dump_type" class="bg-gray-900/60 text-gray-300 text-xs rounded-lg p-2 border border-gray-700/60 focus:ring-2 focus:ring-[#9966CC]">
        <option value="Task">Task</option>
        <option value="Epic">Epic</option>
        <option value="Project">Project</option>
        <option value="Specialization">Specialization</option>
        <option value="Course">Course</option>
        <option value="Module">Module</option>
    </select>
    <button type="submit" class="px-3 py-2 bg-[#9966CC] hover:bg-[#9966CC]/80 text-white rounded-lg text-xs font-semibold shadow-md transition-colors">+</button>
    <div id="quick-entry-toast" class="absolute top-12 right-0 bg-[#50C878] text-gray-950 font-bold text-[10px] tracking-wider uppercase px-2.5 py-1 rounded shadow-lg border border-[#50C878]/30 flex items-center space-x-1" hx-get="{% url 'clear-toast' %}" hx-trigger="load delay:3s" hx-swap="outerHTML">
        <span>✓</span> <span>{{ msg|default:"Dumped to Inbox" }}</span>
    </div>
</form>
