<div class="fixed inset-0 z-40 bg-black/60 backdrop-blur-xs transition-opacity" 
     onclick="document.getElementById('modal-container').innerHTML = '';"></div>

<div class="fixed inset-y-0 right-0 z-50 max-w-lg w-full bg-[#0D111D] border-l border-gray-800 shadow-2xl flex flex-col h-full overflow-hidden text-gray-200">
    <!-- Header -->
    <div class="px-6 py-4 border-b border-gray-800 flex items-center justify-between bg-gray-950/40">
        <div>
            <h3 class="text-lg font-bold text-gray-100 flex items-center space-x-2">
                <span>{% if is_container %}📂 Container{% else %}📝 Task{% endif %} Details</span>
            </h3>
            <p class="text-xs text-gray-500 mt-0.5">ID: {{ obj.id }} • Created: {{ obj.created_at|date:"Y-m-d H:i" }}</p>
        </div>
        <button type="button" 
                onclick="document.getElementById('modal-container').innerHTML = '';" 
                class="text-gray-400 hover:text-white p-1 hover:bg-gray-800/50 rounded-lg transition-colors">
            <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
        </button>
    </div>

    <!-- Form -->
    <form hx-post="{% url 'explorer-grid-modal' model_type=model_type model_id=obj.id %}" 
          {% if source == 'dashboard' %}
          hx-target="#modal-container"
          hx-swap="none"
          {% else %}
          hx-target="#grid-row-{% if is_container %}container-{{ obj.id }}{% else %}item-{{ obj.id }}{% endif %}"
          hx-swap="outerHTML"
          {% endif %}
          class="flex flex-col h-full overflow-hidden">
        
        <input type="hidden" name="depth" value="{{ depth }}">
        <input type="hidden" name="source" value="{{ source }}">
        {% csrf_token %}

        <!-- Scrollable content area -->
        <div class="flex-1 overflow-y-auto p-6 space-y-5">
            
            <!-- Title -->
            <div class="space-y-1.5">
                <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Title</label>
                <input type="text" 
                       name="title" 
                       value="{{ obj.title }}" 
                       required 
                       class="w-full bg-[#05070B] text-gray-200 text-sm rounded-lg border border-gray-800 focus:ring-2 focus:ring-[#9966CC] focus:border-transparent p-2.5 outline-none transition-all">
            </div>

            <!-- Basic Metadata row -->
            <div class="grid grid-cols-2 gap-4">
                <div class="space-y-1.5">
                    <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Type</label>
                    <select name="{% if is_container %}container_type{% else %}item_type{% endif %}" 
                            class="w-full bg-[#05070B] text-gray-300 text-sm rounded-lg border border-gray-800 focus:ring-2 focus:ring-[#9966CC] p-2.5 outline-none">
                        {% for t in types %}
                            <option value="{{ t }}" {% if is_container %}{% if obj.container_type == t %}selected{% endif %}{% else %}{% if obj.item_type == t %}selected{% endif %}{% endif %}>{{ t }}</option>
                        {% endfor %}
                    </select>
                </div>
                
                <div class="space-y-1.5">
                    <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Domain</label>
                    <select name="domain_id" 
                            class="w-full bg-[#05070B] text-gray-300 text-sm rounded-lg border border-gray-800 focus:ring-2 focus:ring-[#9966CC] p-2.5 outline-none"
                            onchange="
                                const opt = this.options[this.selectedIndex];
                                const isAcad = opt.getAttribute('data-is-academy') === 'true';
                                const acadFields = document.getElementById('academy-fields-{{ obj.id }}');
                                if(acadFields) acadFields.style.display = isAcad ? 'block' : 'none';
                            ">
                        <option value="" data-is-academy="false">None</option>
                        {% for d in domains %}
                            <option value="{{ d.id }}" data-is-academy="{% if d.is_academy %}true{% else %}false{% endif %}" {% if obj.domain.id == d.id %}selected{% endif %}>{{ d.name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            {% if is_container %}
            <!-- Academy Fields (Dynamic) -->
            <div id="academy-fields-{{ obj.id }}" class="p-3 bg-[#0D111D] border border-[#9966CC]/30 rounded-lg space-y-3" style="display: {% if obj.domain and obj.domain.is_academy %}block{% else %}none{% endif %};">
                <div class="flex items-center space-x-2 text-[#9966CC] mb-2">
                    <span>🎓</span> <h4 class="text-xs font-bold uppercase tracking-wider">Academy Settings</h4>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1.5">
                        <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Certification / Program</label>
                        <select name="certification_id" class="w-full bg-[#05070B] text-gray-300 text-sm rounded-lg border border-gray-800 focus:ring-2 focus:ring-[#9966CC] p-2.5 outline-none">
                            <option value="">None</option>
                            {% for cert in certifications %}
                                <option value="{{ cert.id }}" {% if obj.certification.id == cert.id %}selected{% endif %}>{{ cert.title }} ({{ cert.provider }})</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Credits Earned</label>
                        <input type="number" step="0.01" name="credits_earned" value="{{ obj.credits_earned }}" class="w-full bg-[#05070B] text-gray-300 text-sm rounded-lg border border-gray-800 focus:ring-2 focus:ring-[#9966CC] p-2.5 outline-none placeholder-gray-600">
                    </div>
                </div>
            </div>
            {% endif %}

            <!-- Priority & Urgency with Jewel colors -->
            <div class="grid grid-cols-2 gap-4">
                <div class="space-y-1.5">
                    <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Priority</label>
                    <select name="priority" 
                            class="w-full bg-[#05070B] text-sm rounded-lg border border-gray-800 focus:ring-2 focus:ring-[#9966CC] p-2.5 outline-none font-bold"
                            style="color: {% if obj.priority == 'Critical' %}#E0115F{% elif obj.priority == 'High' %}#FFBF00{% elif obj.priority == 'Medium' %}#50C878{% else %}#0F52BA{% endif %};"
                            onchange="this.style.color = this.options[this.selectedIndex].style.color;">
                        <option value="Low" {% if obj.priority == 'Low' %}selected{% endif %} style="color: #0F52BA; font-weight: bold;">Low</option>
                        <option value="Medium" {% if obj.priority == 'Medium' %}selected{% endif %} style="color: #50C878; font-weight: bold;">Medium</option>
                        <option value="High" {% if obj.priority == 'High' %}selected{% endif %} style="color: #FFBF00; font-weight: bold;">High</option>
                        <option value="Critical" {% if obj.priority == 'Critical' %}selected{% endif %} style="color: #E0115F; font-weight: bold;">Critical</option>
                    </select>
                </div>

                <div class="space-y-1.5">
                    <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Urgency</label>
                    <select name="urgency" 
                            class="w-full bg-[#05070B] text-sm rounded-lg border border-gray-800 focus:ring-2 focus:ring-[#9966CC] p-2.5 outline-none font-bold"
                            style="color: {% if obj.urgency == 'Immediate' %}#E0115F{% elif obj.urgency == 'High' %}#FFBF00{% elif obj.urgency == 'Normal' %}#50C878{% else %}#0F52BA{% endif %};"
                            onchange="this.style.color = this.options[this.selectedIndex].style.color;">
                        <option value="Low" {% if obj.urgency == 'Low' %}selected{% endif %} style="color: #0F52BA; font-weight: bold;">Low</option>
                        <option value="Normal" {% if obj.urgency == 'Normal' %}selected{% endif %} style="color: #50C878; font-weight: bold;">Normal</option>
                        <option value="High" {% if obj.urgency == 'High' %}selected{% endif %} style="color: #FFBF00; font-weight: bold;">High</option>
                        <option value="Immediate" {% if obj.urgency == 'Immediate' %}selected{% endif %} style="color: #E0115F; font-weight: bold;">Immediate</option>
                    </select>
                </div>
            </div>

            <!-- Task Specific Fields -->
            {% if not is_container %}
                <!-- Status & PARA Category -->
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1.5">
                        <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Status</label>
                        <select name="status" 
                                class="w-full bg-[#05070B] text-gray-300 text-sm rounded-lg border border-gray-800 focus:ring-2 focus:ring-[#9966CC] p-2.5 outline-none">
                            {% for s in statuses %}
                                <option value="{{ s }}" {% if obj.status == s %}selected{% endif %}>{{ s }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="space-y-1.5">
                        <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider">PARA Category</label>
                        <select name="para_category" 
                                class="w-full bg-[#05070B] text-gray-300 text-sm rounded-lg border border-gray-800 focus:ring-2 focus:ring-[#9966CC] p-2.5 outline-none">
                            <option value="">None</option>
                            {% for p in paras %}
                                <option value="{{ p }}" {% if obj.para_category == p %}selected{% endif %}>{{ p }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <!-- Dates picker -->
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1.5">
                        <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Start Date</label>
                        <input type="datetime-local" 
                               name="start_date" 
                               value="{{ obj.start_date|date:'Y-m-d\TH:i' }}" 
                               class="w-full bg-[#05070B] text-gray-300 text-sm rounded-lg border border-gray-800 focus:ring-2 focus:ring-[#9966CC] p-2.5 outline-none">
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Due Date</label>
                        <input type="datetime-local" 
                               name="due_date" 
                               value="{{ obj.due_date|date:'Y-m-d\TH:i' }}" 
                               class="w-full bg-[#05070B] text-gray-300 text-sm rounded-lg border border-gray-800 focus:ring-2 focus:ring-[#9966CC] p-2.5 outline-none">
                    </div>
                </div>

                <!-- Duration estimate & Extra logged time -->
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1.5">
                        <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Est. Duration</label>
                        <input type="text" 
                               name="duration_estimate" 
                               value="{{ duration_estimate_str }}" 
                               placeholder="e.g. 1h 30m"
                               class="w-full bg-[#05070B] text-gray-300 text-sm rounded-lg border border-gray-800 focus:ring-2 focus:ring-[#9966CC] p-2.5 outline-none">
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Log Extra Time</label>
                        <input type="text" 
                               name="extra_actual_time" 
                               placeholder="e.g. 45m"
                               class="w-full bg-[#05070B] text-gray-300 text-sm rounded-lg border border-gray-800 focus:ring-2 focus:ring-[#9966CC] p-2.5 outline-none">
                    </div>
                </div>

                <!-- Fuzzy Timeframe & Notion link -->
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1.5">
                        <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Fuzzy Timeframe</label>
                        <select name="fuzzy_timeframe" 
                                class="w-full bg-[#05070B] text-gray-300 text-sm rounded-lg border border-gray-800 focus:ring-2 focus:ring-[#9966CC] p-2.5 outline-none">
                            <option value="">None</option>
                            <option value="Today" {% if obj.fuzzy_timeframe == 'Today' %}selected{% endif %}>Today</option>
                            <option value="Tomorrow" {% if obj.fuzzy_timeframe == 'Tomorrow' %}selected{% endif %}>Tomorrow</option>
                            <option value="Weekend" {% if obj.fuzzy_timeframe == 'Weekend' %}selected{% endif %}>Weekend</option>
                            <option value="Week" {% if obj.fuzzy_timeframe == 'Week' %}selected{% endif %}>This Week</option>
                            <option value="Month" {% if obj.fuzzy_timeframe == 'Month' %}selected{% endif %}>This Month</option>
                        </select>
                    </div>

                    <div class="space-y-1.5">
                        <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Notion Page Link</label>
                        <input type="url" 
                               name="notion_page_url" 
                               value="{{ notion_page_url }}" 
                               placeholder="https://notion.so/..."
                               class="w-full bg-[#05070B] text-gray-300 text-sm rounded-lg border border-gray-800 focus:ring-2 focus:ring-[#9966CC] p-2.5 outline-none">
                    </div>
                </div>
            {% else %}
                <!-- Container Specific Fields -->
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1.5">
                        <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider">PARA Category</label>
                        <select name="para_category" 
                                class="w-full bg-[#05070B] text-gray-300 text-sm rounded-lg border border-gray-800 focus:ring-2 focus:ring-[#9966CC] p-2.5 outline-none">
                            <option value="">None</option>
                            {% for p in paras %}
                                <option value="{{ p }}" {% if obj.para_category == p %}selected{% endif %}>{{ p }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="space-y-1.5">
                        <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Parent Container</label>
                        <select name="parent_id" 
                                class="w-full bg-[#05070B] text-gray-300 text-sm rounded-lg border border-gray-800 focus:ring-2 focus:ring-[#9966CC] p-2.5 outline-none">
                            <option value="none">None (Root)</option>
                            {% for c in all_containers %}
                                <option value="{{ c.id }}" {% if obj.parent.id == c.id %}selected{% endif %}>{{ c.title }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
            {% endif %}

            <!-- Many-to-Many Tags selection -->
            <div class="space-y-2">
                <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Tags</label>
                <div class="bg-[#05070B] border border-gray-800 rounded-lg p-3 max-h-40 overflow-y-auto grid grid-cols-2 gap-2">
                    {% for t in all_tags %}
                        <label class="flex items-center space-x-2.5 p-1.5 hover:bg-gray-900 rounded-md cursor-pointer text-xs">
                            <input type="checkbox" 
                                   name="tags" 
                                   value="{{ t.id }}"
                                   {% if t in obj.tags.all %}checked{% endif %}
                                   class="rounded text-[#9966CC] focus:ring-[#9966CC] bg-gray-950 border-gray-800 h-4 w-4">
                            <span style="color: {{ t.color }}; font-weight: bold;">{{ t.name }}</span>
                        </label>
                    {% endfor %}
                </div>
            </div>

        </div>

        <!-- Footer / Action Buttons -->
        <div class="px-6 py-4 border-t border-gray-800 bg-gray-950/40 flex items-center justify-end space-x-3">
            <button type="button" 
                    onclick="document.getElementById('modal-container').innerHTML = '';" 
                    class="px-4 py-2 border border-gray-850 rounded-lg text-xs font-semibold text-gray-400 hover:text-white hover:bg-gray-800 transition-colors">
                Cancel
            </button>
            <button type="submit" 
                    class="px-4 py-2 bg-[#9966CC] hover:bg-[#9966CC]/80 text-white rounded-lg text-xs font-semibold shadow-md transition-colors">
                Save Changes
            </button>
        </div>

    </form>
</div>
