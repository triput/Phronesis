{% extends 'base.html' %}

{% block content %}
<!-- Include FullCalendar CDN -->
<script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>

<div class="space-y-6">
    <div class="flex justify-between items-end">
        <div>
            <h1 class="text-3xl font-black text-gray-100 tracking-tight flex items-center">
                Interactive Planner
                <span class="ml-3 px-2 py-0.5 rounded text-[10px] uppercase font-bold bg-[#9966CC]/20 text-[#9966CC] border border-[#9966CC]/30">V4 SLM Engine</span>
            </h1>
            <p class="text-sm text-gray-400 mt-1">AI-assisted semantic constraint resolution and calendar scheduling.</p>
        </div>
    </div>
    
    <!-- NL Input Section -->
    <div class="bg-[#0D111D] border border-[#9966CC]/30 rounded-2xl p-6 shadow-[0_0_15px_rgba(153,102,204,0.1)]">
        <h3 class="text-sm font-bold text-gray-200 mb-3 flex items-center">
            <svg class="w-4 h-4 mr-2 text-[#9966CC]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
            Natural Language Scheduling
        </h3>
        
        <form hx-post="{% url 'planner-parse-nl' %}" hx-target="#nl-response" hx-indicator="#nl-spinner" class="flex space-x-3">
            {% csrf_token %}
            <input type="text" name="nl_text" placeholder="e.g., 'Schedule my math homework for tomorrow afternoon (high priority)'" class="flex-1 bg-[#0B0F19] text-gray-200 border border-gray-800 focus:ring-1 focus:ring-[#9966CC] focus:border-transparent rounded-xl px-4 py-3 text-sm placeholder-gray-600 shadow-inner">
            <button type="submit" class="px-6 py-3 bg-[#9966CC] hover:bg-[#9966CC]/80 text-white rounded-xl text-sm font-bold shadow-[0_0_10px_rgba(153,102,204,0.4)] transition-all flex items-center">
                <span>Parse & Schedule</span>
                <div id="nl-spinner" class="htmx-indicator ml-2">
                    <svg class="animate-spin h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                </div>
            </button>
        </form>
        <div id="nl-response" class="mt-3 empty:hidden"></div>
    </div>
    
    <!-- Calendar Grid -->
    <div class="bg-[#0D111D] border border-gray-800/80 rounded-2xl p-6 shadow-xl">
        <div id="calendar" class="text-sm"></div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        var calendarEl = document.getElementById('calendar');
        var calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'timeGridWeek',
            headerToolbar: {
                left: 'prev,next today',
                center: 'title',
                right: 'dayGridMonth,timeGridWeek,timeGridDay'
            },
            themeSystem: 'standard',
            height: 700,
            allDaySlot: true,
            slotMinTime: '06:00:00',
            slotMaxTime: '24:00:00',
            nowIndicator: true,
            events: [
                {% for alloc in allocations %}
                {
                    title: '{{ alloc.execution_item.title|escapejs }}',
                    start: '{{ alloc.start_time|date:"c" }}',
                    end: '{{ alloc.end_time|date:"c" }}',
                    {% with domain=alloc.execution_item.domain first_tag=alloc.execution_item.tags.first %}
                    {% if domain and domain.color %}
                    backgroundColor: '{{ domain.color }}22',
                    borderColor: '{{ domain.color }}',
                    textColor: '#f3f4f6',
                    {% elif first_tag and first_tag.color %}
                    backgroundColor: '{{ first_tag.color }}22',
                    borderColor: '{{ first_tag.color }}',
                    textColor: '#f3f4f6',
                    {% else %}
                    backgroundColor: '#9966CC22',
                    borderColor: '#9966CC',
                    textColor: '#f3f4f6',
                    {% endif %}
                    {% endwith %}
                    extendedProps: {
                        type: 'allocation',
                        score: '{{ alloc.score_metric }}'
                    }
                },
                {% endfor %}
            ].concat(
                {{ unallocated_events_json|safe }}
            ).concat(
                {{ cal_events_json|safe }}
            ),
            eventClick: function(info) {
                if (info.event.extendedProps.type === 'calendar') {
                    info.jsEvent.preventDefault(); 
                    if (confirm('Toggle blocking status for this calendar event?')) {
                        window.location.href = info.event.url;
                    }
                }
            }
        });
        calendar.render();
    });
</script>

<style>
    /* Dark theme overrides for FullCalendar */
    .fc-theme-standard .fc-scrollgrid { border-color: #1f2937; }
    .fc-theme-standard td, .fc-theme-standard th { border-color: #1f2937; }
    .fc-col-header-cell-cushion, .fc-daygrid-day-number { color: #9ca3af; text-decoration: none; }
    .fc-timegrid-slot-label-cushion { color: #6b7280; }
    .fc-timegrid-now-indicator-line { border-color: #E0115F; }
    .fc-timegrid-now-indicator-arrow { border-color: #E0115F; }
    .fc .fc-button-primary { background-color: #1f2937; border-color: #374151; text-transform: capitalize; }
    .fc .fc-button-primary:hover { background-color: #374151; border-color: #4b5563; }
    .fc .fc-button-primary:not(:disabled).fc-button-active, .fc .fc-button-primary:not(:disabled):active { background-color: #9966CC; border-color: #7a52a3; }
</style>
{% endblock %}
